<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator Using Pure Js</title>
    <link rel="stylesheet" href="common.css" />
    <style>
      body {
        background-color: black;
        color: #fff;
        text-transform: capitalize;
      }
      .input-box,
      .box {
        background-color: #2f3542;
        padding: 20px;
        border-radius: 3px;
      }
      .card h2 {
        padding: 15px;
        text-align: center;
        color: dimgray;
      }
      .input-box {
        margin-bottom: 15px;
      }
      .input-box input {
        outline: none;
        border: none;
        font-size: 25px;
        background-color: transparent;
        color: #fff;
        letter-spacing: 1px;
      }
      .input-box i {
        cursor: pointer;
        color: #38bb17;
      }
      .box .inline,
      .strength {
        justify-content: space-between;
        margin-bottom: 15px;
      }
      input[type="range"] {
        width: 100%;
        margin-bottom: 15px;
        -webkit-appearance: none;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        box-shadow: 1px 1px 3px #000000;
        background: #33ff00;
        border-radius: 10px;
        border: 0px solid #000000;
      }
      input[type="range"]::-webkit-slider-thumb {
        box-shadow: 0px 0px 0px gray;
        border: 1px solid #000000;
        height: 20px;
        width: 20px;
        border-radius: 22px;
        background: #fafafa;
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -6.5px;
      }
      input[type="range"]::-moz-range-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        box-shadow: 1px 1px 3px #000000;
        background: #33ff00;
        border-radius: 10px;
        border: 0px solid #000000;
      }
      input[type="range"]::-moz-range-thumb {
        box-shadow: 0px 0px 0px #000000;
        border: 1px solid #000000;
        height: 20px;
        width: 20px;
        border-radius: 22px;
        background: #fafafa;
        cursor: pointer;
      }
      input[type="range"]::-ms-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: transparent;
        border-color: transparent;
        color: transparent;
      }
      input[type="range"]::-ms-fill-lower {
        background: #33ff00;
        border: 0px solid #000000;
        border-radius: 20px;
        box-shadow: 1px 1px 3px #000000;
      }
      input[type="range"]::-ms-fill-upper {
        background: #33ff00;
        border: 0px solid #000000;
        border-radius: 20px;
        box-shadow: 1px 1px 3px #000000;
      }
      input[type="range"]::-ms-thumb {
        margin-top: 1px;
        box-shadow: 0px 0px 0px #000000;
        border: 1px solid #000000;
        height: 20px;
        width: 20px;
        border-radius: 22px;
        background: #fafafa;
        cursor: pointer;
      }
      input[type="range"]:focus::-ms-fill-lower {
        background: #33ff00;
      }
      input[type="range"]:focus::-ms-fill-upper {
        background: #33ff00;
      }
      ul {
        list-style-type: none;
      }
      ul li {
        margin-bottom: 10px;
        font-size: 20px;
      }
      ul li input {
        cursor: pointer;
        -webkit-accent-color: #33ff00;
        accent-color: #33ff00;
        width: 15px;
        height: 15px;
        font-size: 20px;
      }
      .strength {
        letter-spacing: 1px;
      }
      .indicator span {
        width: 10px;
        height: 20px;
        display: inline-block;
        border: 2px solid #d8c600;
        margin: 0px 3px;
      }
      .indicator span.active {
        background-color: #d8c600;
      }
      .strength h3 {
        font-size: 20px;
      }
      .indicator b {
        margin-right: 10px;
      }
      button[type="button"] {
        width: 100%;
        padding: 10px;
        font-size: 20px;
        text-transform: capitalize;
        outline: none;
        border: none;
        background-color: #24780f;
        color: #fff;
        border-radius: 3px;
        cursor: pointer;
      }
      button i {
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div class="card">
        <h2>password Generator</h2>
        <div class="input-box">
          <input type="text" id="output" readonly />
          <i class="fa-regular fa-copy" id="copy"></i>
        </div>
        <div class="box">
          <div class="inline d-flex">
            <h3>character length</h3>
            <b id="len">10</b>
          </div>
          <input type="range" min="6" max="10" id="range" />
          <ul>
            <li>
              <input data-s="upper" checked class="ch-bx" type="checkbox" />
              include uppercase letters
            </li>
            <li>
              <input data-s="lower" class="ch-bx" type="checkbox" /> include
              lowercase letters
            </li>
            <li>
              <input data-s="num" class="ch-bx" type="checkbox" /> include
              numbers
            </li>
            <li>
              <input data-s="sym" class="ch-bx" type="checkbox" /> include
              symbols
            </li>
          </ul>
          <div class="strength d-flex">
            <h3>strength</h3>
            <div id="indicator" class="indicator d-flex">
              <b>weak</b>
              <span class="active"></span><span></span><span></span
              ><span></span>
            </div>
          </div>
          <button id="gen" type="button">
            generate <i class="fa-solid fa-arrow-right-long"></i>
          </button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
